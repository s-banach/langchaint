name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      # scripts/CI.sh runs pyrefly, ruff, and pytest through `uv run`, which syncs the locked dev dependency group first.
      # The check configuration lives in that committed script, not in this workflow.
      - run: bash scripts/CI.sh
